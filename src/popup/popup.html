<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Extension Popup</title>
    <style>
      body {
        color: #333;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        margin: 0;
        padding: 16px;
        width: 250px;
      }
      h2 {
        font-size: 16px;
        margin-top: 0;
      }
      button {
        background: #4a90e2;
        border-radius: 4px;
        border: none;
        color: white;
        cursor: pointer;
        padding: 8px;
        width: 100%;
      }
      button:hover {
        background: #357abd;
      }
    </style>
  </head>
  <body>
    <h2>Extension Active</h2>
    <p style="font-size: 13px; color: #666">This is your starter popup view.</p>
    <button id="open-options">Open Settings Workspace</button>
    <script src="../lib/browser-polyfill.min.js"></script>
    <script type="module" src="popup.js"></script>
  </body>
</html>
